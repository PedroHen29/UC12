<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <form action="">
        <!-- input de texto -->
        <label for="username">Nome</label>
        <input name="username" type="text" placeholder="Insira seu nome">
        
        <label for="email">Email</label>
        <input type="email" name="email" id="" placeholder="Insira seu email">

        <label for="password">Senha</label>
        <input type="password" name="password" id="" placeholder="Insira sua senha">

        <label for="interesse">Interesses</label>
        <input type="checkbox" nmae="interesse" value="html">HTML
        <input type="checkbox" name="checkbox" id="" value="javaScript">JS
        <input type="checkbox" name="checkbox" id="" value="css">CSS

        <label for="genero">Genero</label>
        <input type="radio" name="genero" id="" value="maculino">Mascolino
        <input type="radio" name="genero" id="" value="Feminino">Feminino
        <input type="radio" name="genero" value="prefiro não informar">Prefiro não informar

        <label for="curso">Curso</label>
        <select name="curso" id="">
            <option value="javaScript">javaScript</option>
            <option value="css">css</option>
            <option value="html">html</option>
        </select>

        <label for="comentario">Comentario</label>
        <textarea name="Comentario" id="" cols="30" rows="5" placeholder="Insira seu comentario"></textarea>

        

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
