<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="assets/styles/calculadora.css">
</head>
<body>
    
    <div class="fundo">
        <div class="base">
            
                <h1 class="resultado">0</h1>
            
            
            <table>
                <tr>
                    <td colspan="3"><button class="numero" id="C">C</button></td>
                    <td><button class="operacao" id="mais">+</button></td>
                </tr>
                <tr>
                    <td><button class="numero">7</button></td>
                    <td><button class="numero">8</button></td>
                    <td><button class="numero">9</button></td>
                    <td><button class="operacao" id="menos">-</button></td>
                    
                    
                </tr>

                <tr>
                    <td><button class="numero">4</button></td>
                    <td><button class="numero">5</button></td>
                    <td><button class="numero">6</button></td>
                    <td><button class="operacao" id="vezes">x</button></td>
                    
                    </tr>

                    <tr>
                        <td><button class="numero">1</button></td>
                        <td><button class="numero">2</button></td>
                        <td><button class="numero">3</button></td>
                        <td><button class="operacao" id="divisao">/</button></td>
                        
                    </tr>

                    <tr>
                        <td colspan="2"><button class="numero" id="zero">0</button></td>
                        <td><button class="numero">.</button></td>
                        <td><button class="operacao" id="igual">=</button></td>
                        
                        
                    </tr>
            </table>
            
        </div>
        <button class="mudarTema">
            <img class="noite_dia" src="assets/img/sun.png" alt="">
        </button> 
    </div>
    <script src="assets/scripts/calculadora.js"></script>
</body>
</html>
