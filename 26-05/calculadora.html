<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="assets/styles/calculadora.css">
</head>
<body>
    <div class="base">
        <div class="visor">
            <h1>1</h1>
        </div>


         <div class="numeros">
            <button class = "numero" id="btn">0</button>
            <button class = "numero" id="btn1">1</button>
            <button class = "numero" id="btn2">2</button>
            <button class = "numero" id="btn3">3</button>
            <button class = "numero" id="btn4">4</button>
            <button class = "numero" id="btn5">5</button>
            <button class = "numero" id="btn6">6</button>
            <button class = "numero" id="btn7">7</button>
            <button class = "numero" id="btn8">8</button>
            <button class = "numero" id="btn9">9</button>
        </div>
        
        <div class="operacoes">
        <button class = "operacao" id="mais">+</button>
        <button class = "operacao" id="menos">-</button>
        <button class = "operacao" id="vezes">*</button>
        <button class = "operacao" id="divisao">/</button>
        <button class = "operacao" id="igual">=</button>
        <button class = "operacao" id="limpar">C</button>
        </div>
        
    </div> 
    <script src="assets/scripts/calculadora.js"></script>
</body>
</html>
