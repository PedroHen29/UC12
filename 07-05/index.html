<!DOCTYPE html>

<!--
    lang indica a linguagem da pagina
-->

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--title mostra o titulo da pagina no navegador-->
    <title>Minha pagina</title>
    <!-- assim carregamos o css para nossa pagina -->
    <link rel="stylesheet" href="assets/css/index.css">
</head>

<!-- body é a tag que envolve tudo que aparece na minha pagina -->
<body>
    <h1>Noticias</h1>
    <h2 class="primeiroh2">Homem assalta moto</h2>
    <p>Na tarde deste dia um homem passa e pega moto de brinquedo da criança</p>
    <hr>
    <h2>Cachorro rouba moto</h2>

    <!-- a é a tag de link -->
    <!-- toda tag tem propriedades
        são os itens em amarelo
    -->
    <a href="https://pt.wikipedia.org/wiki/Lionel_Messi" target="_blank">Messi</a>

    <!-- img é a tag de imagem-->
    <!-- src é onde colocamos o link da imagem-->
    <!--alt é o texto curto descritivo da imagem-->

    <!-- Usando uma imagem via link-->
    <img src="https://s2-oglobo.glbimg.com/FdVMNPYHQggCK8AMfPNk8jasygc=/0x0:1080x1043/888x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_da025474c0c44edd99332dddb09cabe8/internal_photos/bs/2023/t/q/qzvBXTTA2iOU3ivehoDw/320489457-195090603100868-7252177604779913634-n.jpg" 
    alt="Messi Copa do mundo">

    <img src="assets/images/messi.jpg" alt="">

    <!-- ul é a tag de lista não ordenada -->
    <!-- li é a tag que representa cada item da lista-->
    <li>item 1</li>
    <li>Outro item</li>
    <li>mais um item</li>

    <!-- ol é a tag da lista da ordenada-->
    <ol>
        <li>item</li>
        <li>outro item</li>
        <li>mais um item</li>
    </ol>

    <!-- botton é a tag da botão-->
    <button>clique aqui</button>
</body>
</html>
